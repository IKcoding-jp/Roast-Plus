name: Auto Fix Issue (Claude Code)

# GitHubのIssueに `auto-fix` ラベルが付いたとき、Claude Codeが自動で調査→実装→PR作成を行う
#
# 事前準備:
# - GitHub Secrets に ANTHROPIC_API_KEY を設定すること
# - GitHub Settings > General > Auto-merge を有効にすること（自動マージに必要）
#
# 使い方:
# Issueに `auto-fix` ラベルを付けると自動で起動します
# PRが作成されたあとCIが通れば自動マージされます

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    # auto-fixラベルが付いたときのみ実行
    if: github.event.label.name == 'auto-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run Claude Code to fix issue
        uses: anthropic/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_turns: 60
          prompt: |
            GitHub Issue #${{ github.event.issue.number }} を解決してください。

            ## Issue情報
            タイトル: ${{ github.event.issue.title }}
            本文:
            ${{ github.event.issue.body }}

            ## 実行手順

            1. **ブランチ作成**
               ```bash
               # Issueラベルに応じてブランチ名を決定
               # bug/bugfix → fix/#番号-説明
               # enhancement/feature → feat/#番号-説明
               git checkout -b fix/#${{ github.event.issue.number }}-auto-fix
               ```

            2. **コードベース調査**
               - Issueの問題に関連するファイル・関数・変数を特定する
               - バグの場合はデータフローを追跡し、根本原因を特定する

            3. **実装**
               - 最小限の変更で問題を解決する
               - 関連するテストも修正/追加する

            4. **検証**
               ```bash
               npm run lint && npm run build && npm run test:run
               ```
               - すべてパスするまで修正を繰り返す

            5. **コミット・PR作成**
               ```bash
               git add <変更ファイル>
               git commit -m "fix(#${{ github.event.issue.number }}): <説明>"
               git push -u origin HEAD
               ```

               PRは以下の内容で作成:
               - タイトル: `fix(#${{ github.event.issue.number }}): <問題の説明>`
               - 本文: 変更内容・テスト結果・Closes #${{ github.event.issue.number }}
               - ベースブランチ: `main`

            ## 重要ルール
            - mainブランチへの直接コミット禁止
            - テストが失敗したままコミットしない
            - ハードコード色（bg-white等）は使わず、CSS変数（bg-page等）を使う
            - UIデザイン変更を含む場合は最小限の変更に留める
          allowed_tools: "Bash,Edit,Write,Read,Grep,Glob,Task"

      - name: Comment on issue if failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ github.event.issue.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Claude Codeによる自動修正が失敗しました。手動での対応が必要です。\n\nWorkflow: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            })
