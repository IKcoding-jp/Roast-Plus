name: Deploy to Firebase on merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci && npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ROASTPLUS_72FA6 }}
          channelId: live
          projectId: roastplus-72fa6

  health_check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Wait for deployment propagation
        run: sleep 30
      - name: Check site availability
        run: |
          for i in 1 2 3; do
            if curl -sf https://roastplus-72fa6.web.app/ > /dev/null; then
              echo "Site is healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Site health check failed after 3 attempts"
          exit 1

  deploy_functions:
    name: Deploy Cloud Functions
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for functions changes
        id: changes
        run: |
          if git diff HEAD~1 --name-only | grep -q '^functions/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 20
      - name: Install Functions dependencies
        if: steps.changes.outputs.changed == 'true'
        run: cd functions && npm ci
      - name: Deploy Functions
        if: steps.changes.outputs.changed == 'true'
        uses: w9jds/firebase-action@v15.8.0
        with:
          args: deploy --only functions
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ROASTPLUS_72FA6 }}
          PROJECT_ID: roastplus-72fa6
