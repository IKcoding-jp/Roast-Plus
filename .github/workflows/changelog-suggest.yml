name: Changelog Suggest

# PR作成時にユーザー向け更新内容のAIドラフトをPRコメントに投稿する

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  suggest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse changelog section
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // 「ユーザー向け更新内容」セクションを抽出
            const match = body.match(/## ユーザー向け更新内容[\s\S]*?\n([\s\S]*?)<!-- \/changelog -->/);
            const content = match ? match[1].trim() : '';

            // "-" のみ（空エントリ）かどうか判定
            const isEmpty = /^[\s\-*]*$/.test(content);

            console.log('抽出されたコンテンツ:', JSON.stringify(content));
            console.log('空エントリ:', isEmpty);

            core.setOutput('content', content);
            core.setOutput('is_empty', isEmpty ? 'true' : 'false');

      - name: Generate AI draft
        id: ai_draft
        if: steps.parse.outputs.is_empty == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # PR情報からAIドラフトを生成
          PROMPT="以下のPRタイトルと説明をもとに、アプリのユーザー向け更新内容を2〜4行の箇条書きで生成してください。
          技術用語や開発者向けの内容は含めないでください。
          日本語で、アプリを使う一般ユーザーにわかる言葉で書いてください。
          各行は「- 」で始めてください。

          PRタイトル: ${PR_TITLE}

          PR説明の概要:
          $(echo \"${PR_BODY}\" | head -50)"

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              '{
                model: "gpt-4o-mini",
                messages: [{ role: "user", content: $prompt }],
                max_tokens: 300
              }'
            )")

          DRAFT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "- AIドラフトの生成に失敗しました"')
          echo "draft<<EOF" >> $GITHUB_OUTPUT
          echo "$DRAFT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post AI draft comment
        if: steps.parse.outputs.is_empty == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const draft = `${{ steps.ai_draft.outputs.draft }}`;

            const comment = `🤖 **AIが「ユーザー向け更新内容」のドラフトを生成しました**

            内容を確認し、PR本文の該当セクションにコピーして編集してください。

            ---

            ${draft}

            ---
            *ユーザーに見える変化がない場合は、\`-\` のままで構いません。*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment,
            });

            console.log('AIドラフトコメントを投稿しました');

      - name: Skip (content already provided)
        if: steps.parse.outputs.is_empty == 'false'
        run: echo "ユーザー向け更新内容が記入済みのためスキップします"
